version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: portfolio_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - portfolio-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: portfolio_backend
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      MONGO_URI: mongodb://mongodb:27017/portfolio
      PORT: 4000
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - portfolio-network
    restart: unless-stopped

volumes:
  mongo_data:
    driver: local

networks:
  portfolio-network:
    driver: bridge
